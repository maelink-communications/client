<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rethink+Sans:ital,wght@0,400..800;1,400..800&display=swap"
        rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - maelink</title>
    <link rel="stylesheet" href="style.css">
</head>

<body style="background: #232323">
    <div class="topbar">
        <p>This is an early closed alpha of maelink gen2. Expect bugs, glitches and please report anything you find on
            the maelink Discord.</p>
        <span class="close-topbar" onclick="closeTopbar()">x</span>
    </div>
    <div class="sidenav">
        <div class="logo-and-pill">
            <img src="static/logo.svg" alt="maelink logo" class="logo">
            <h3 class="pill">closed alpha</h3>
        </div>
        <div class="home-and-communities">
            <div class="home-container">
                <img src="static/home.svg" alt="home icon" class="home-icon">
                <h3 class="home">Home</h3>
            </div>
            <div class="communities-container">
                <h3 class="communities">Communities</h3>

            </div>
        </div>
        <div class="user-icon-container">
            <img src="static/defaultuser.png" alt="User Icon" class="user-img">
            <div class="dropdown">
                <img src="static/settings.png" alt="Settings" class="dropdown-icon">
                <img src="static/logout.png" alt="Logout" class="dropdown-icon" id="logout">
            </div>
        </div>
    </div>
    <div class="content">
        <form id="postFormElement">
            <textarea id="postContent" placeholder="Penny for your thoughts." required></textarea>
            <input type="submit" value="Post">
        </form>
        <div id="postsContainer"></div>
    </div>
    <script src="main.js"></script>
    <script>
        function closeTopbar() {
            document.querySelector('.topbar').style.display = 'none';
        }
    </script>
</body>

</html>
