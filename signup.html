<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>maelink</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background"></div>
    <div class="topnav">
        <img src="static/logo.svg" alt="Snowshare logo" class="logo">
    </div>
    <div class="box">
        <h2>Sign up for a maelink account today!</h2>
        <form action="home">
            <p class="login_input_label">Username</p>
            <input type="text" placeholder="Enter your username...">
            <p class="login_input_label">Password</p>
            <input type="password" placeholder="Enter your password...">
            <input type="submit" value="Signup">
        </form>
        <a class="login_input_label" href="login.html">Did you mean to login instead?</a>
    </div>
</body>
</html>
