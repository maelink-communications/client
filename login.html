<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>maelink</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background"></div>
    <div class="topnav">
        <img src="static/logo.svg" alt="Snowshare logo" class="logo">
    </div>
    <div class="box">
        <h2>Login to your account</h2>
        <form action="home">
            <p class="login_input_label">Username</p>
            <input type="text" placeholder="Enter your username...">
            <p class="login_input_label">Password</p>
            <input type="password" placeholder="Enter your password...">
            <input type="submit" value="Login">
        </form>
        <a class="login_input_label" href="signup.html">Did you mean to sign up instead?</a>
    </div>
</body>
</html>
